name: AI Code Review

# Runs on every pull request
on:
  pull_request:
    types: [opened, synchronize]
    # Only review actual code changes, not docs
    paths:
      - 'src/**/*.cs'
      - 'src/**/*.csproj'

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest

    # Needs write access to post comments on the PR
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch the full history so we can see what changed
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          # Get list of changed .cs files in this PR
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '\.cs$' | head -20)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get diff of changed files
        id: diff
        run: |
          # Get the actual code changes (diff)
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD \
            -- '*.cs' | head -c 8000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: AI Code Review
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Send the diff to OpenAI and get a review back
          REVIEW=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d '{
              "model": "gpt-4o-mini",
              "max_tokens": 1000,
              "messages": [
                {
                  "role": "system",
                  "content": "You are a senior .NET engineer reviewing a pull request. Review the code diff and provide concise, actionable feedback. Focus on: correctness, security issues, performance problems, and .NET best practices. Be direct and helpful. Format your response in markdown with clear sections. Keep it under 500 words."
                },
                {
                  "role": "user",
                  "content": "Please review this pull request diff:\n\n```diff\n${{ steps.diff.outputs.diff }}\n```\n\nChanged files:\n${{ steps.changed.outputs.files }}"
                }
              ]
            }' | jq -r '.choices[0].message.content')

          # Save the review to a file to avoid shell escaping issues
          echo "$REVIEW" > review.md
          echo "Review generated successfully"

      - name: Post review comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.md', 'utf8');

            // Post the AI review as a comment on the PR
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 AI Code Review\n\n${review}\n\n---\n*Generated by GPT-4o-mini. Always review AI suggestions critically.*`
            });