name: AI Code Review

# Runs on every pull request
on:
  pull_request:
    types: [opened, synchronize]
    # Only review actual code changes, not docs
    paths:
      - 'src/**/*.cs'
      - 'src/**/*.csproj'

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest

    # Needs write access to post comments on the PR
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch the full history so we can see what changed
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          # Get list of changed .cs files in this PR
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '\.cs$' | head -20)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get diff of changed files
        id: diff
        run: |
          # Get the actual code changes (diff)
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD \
            -- '*.cs' | head -c 8000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: AI Code Review
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          DIFF="${{ steps.diff.outputs.diff }}"
          
          # If diff is empty, post a simple message
          if [ -z "$DIFF" ]; then
            echo "No C# code changes detected in this PR." > review.md
            exit 0
          fi

          # Escape the diff for JSON
          ESCAPED_DIFF=$(echo "$DIFF" | python3 -c "
          import sys, json
          print(json.dumps(sys.stdin.read()))
          ")

          # Send to OpenAI
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"max_tokens\": 1000,
              \"messages\": [
                {
                  \"role\": \"system\",
                  \"content\": \"You are a senior .NET engineer reviewing a pull request. Review the code diff and provide concise, actionable feedback. Focus on: correctness, security issues, performance problems, and .NET best practices. Be direct and helpful. Format your response in markdown with clear sections. Keep it under 500 words.\"
                },
                {
                  \"role\": \"user\",
                  \"content\": \"Please review this pull request diff:\\n\\n\" $ESCAPED_DIFF
                }
              ]
            }")

          # Extract the review text
          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Could not generate review — OpenAI API may be unavailable."')
          echo "$REVIEW" > review.md
          echo "Review generated"