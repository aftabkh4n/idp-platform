name: AI Code Review

# Runs on every pull request
on:
  pull_request:
    types: [opened, synchronize]
    # Only review actual code changes, not docs
    paths:
      - 'src/**/*.cs'
      - 'src/**/*.csproj'

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest

    # Needs write access to post comments on the PR
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch the full history so we can see what changed
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          # Get list of changed .cs files in this PR
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '\.cs$' | head -20)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get diff of changed files
        id: diff
        run: |
          # Get the actual code changes (diff)
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD \
            -- '*.cs' | head -c 8000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: AI Code Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          python3 << 'PYTHON'
          import urllib.request
          import json
          import os

          base_ref = os.environ['BASE_REF']

          # Get the diff using the base ref from environment
          diff = os.popen(
              f"git diff origin/{base_ref}...HEAD -- '*.cs' | head -c 6000"
          ).read()

          if not diff.strip():
              open('review.md', 'w').write('No C# code changes detected in this PR.')
              print("No diff found")
              exit(0)

          print(f"Diff length: {len(diff)} chars")

          payload = {
              "model": "gpt-4o-mini",
              "max_tokens": 1000,
              "messages": [
                  {
                      "role": "system",
                      "content": "You are a senior .NET engineer reviewing a pull request. Give concise actionable feedback on correctness, security, performance, and .NET best practices. Use markdown formatting."
                  },
                  {
                      "role": "user",
                      "content": f"Review this pull request diff:\n\n```diff\n{diff}\n```"
                  }
              ]
          }

          req = urllib.request.Request(
              'https://api.openai.com/v1/chat/completions',
              data=json.dumps(payload).encode(),
              headers={
                  'Content-Type': 'application/json',
                  'Authorization': f"Bearer {os.environ['OPENAI_API_KEY']}"
              }
          )

          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())
              review = data['choices'][0]['message']['content']
              open('review.md', 'w').write(review)
              print("Review written successfully")
          PYTHON